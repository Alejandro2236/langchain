<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Ayuda - SmartTicket</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">Reportar Incidente de TI</h1>
        
        <form id="ticketForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nombre del Empleado</label>
                <input type="text" id="empleado" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Corporativo</label>
                <input type="email" id="correo" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Departamento</label>
                <select id="departamento" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                    <option value="Finanzas">Finanzas</option>
                    <option value="Logística">Logística</option>
                    <option value="Infraestructura">Infraestructura</option>
                    <option value="Recursos Humanos">Recursos Humanos</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Descripción del Problema</label>
                <textarea id="descripcion" rows="4" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500" placeholder="Describe detalladamente qué sucede..."></textarea>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md font-semibold hover:bg-blue-700 transition duration-200">
                Enviar Reporte a IA
            </button>
        </form>

        <div id="resultado" class="mt-6 p-4 rounded-md hidden"></div>
    </div>

    <script>
        document.getElementById('ticketForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.className = "mt-6 p-4 rounded-md bg-yellow-50 text-yellow-800";
            resultadoDiv.innerText = "Procesando con Inteligencia Artificial...";
            resultadoDiv.classList.remove('hidden');

            // Captura de datos del formulario
            const datos = {
                empleado: document.getElementById('empleado').value,
                correo: document.getElementById('correo').value,
                departamento: document.getElementById('departamento').value,
                descripcion: document.getElementById('descripcion').value
            };

            try {
                // Llamada HTTP POST a tu backend de FastAPI
                const response = await fetch('http://127.0.0.1:8000/procesar-ticket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                const resData = await response.json();

                if (response.ok) {
                    const analisis = resData.analisis_ia;
                    resultadoDiv.className = "mt-6 p-4 rounded-md bg-green-50 text-green-900 border border-green-200 space-y-2";
                    resultadoDiv.innerHTML = `
                        <p class="font-bold">✅ ¡Ticket Procesado con Éxito!</p>
                        <p><strong>Categoría:</strong> ${analisis.categoria}</p>
                        <p><strong>Criticidad:</strong> ${analisis.criticidad}</p>
                        <p><strong>Resumen:</strong> ${analisis.resumen}</p>
                        <p class="text-sm bg-white p-2 rounded border mt-2"><strong>Sugerencia de IA:</strong> ${analisis.solucion_infraestructura}</p>
                    `;
                } else {
                    throw new Error("Error en el servidor");
                }
            } catch (error) {
                resultadoDiv.className = "mt-6 p-4 rounded-md bg-red-50 text-red-800 border border-red-200";
                resultadoDiv.innerText = "❌ Error al conectar con el servidor de IA.";
            }
        });
    </script>
</body>
</html>
